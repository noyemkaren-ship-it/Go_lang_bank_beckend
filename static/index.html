<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO_BANK</title>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }
        
        h1 {
            font-size: 4em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        p {
            font-size: 1.5em;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .links {
            display: flex;
            gap: 30px;
        }
        
        a {
            color: white;
            text-decoration: none;
            font-size: 1.3em;
            padding: 15px 40px;
            border: 2px solid white;
            border-radius: 50px;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        a:hover {
            background: white;
            color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <h1>🏦 GO_BANK</h1>
    <p>Please register or login</p>
    <div class="links">
        <a href="/register-page">Регистрация</a>
        <a href="/login-page">Вход</a>
    </div>
</body>
</html>
